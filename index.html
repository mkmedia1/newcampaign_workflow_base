<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>New Campaign</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:        #1c2250;
  --blue:        #6976e7;
  --blue-dark:   #2f3886;
  --blue-light:  #b4baf3;
  --blue-bg:     #e1e3fa;
  --blue-alt:    #8e98ed;
  --text:        #55597c;
  --muted:       #8d90a7;
  --border:      #cbcde1;
  --border-lt:   #e1e3fa;
  --orange:      #ffca7f;
  --danger:      #bf2540;
  --section-bg:  #f8f9fe;
  --white:       #ffffff;
}

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #f2f2f2;
  min-height: 100vh;
}

.overlay {
  position: fixed; inset: 0;
  background: rgba(28,34,80,0.5);
  display: flex; align-items: flex-start; justify-content: center;
  padding: 40px 20px 48px;
  overflow-y: auto; z-index: 1000;
}

.modal {
  background: var(--white);
  border-radius: 16px;
  width: 100%; max-width: 860px;
  box-shadow: 0 12px 48px rgba(28,34,80,0.2);
  display: flex; flex-direction: column; overflow: hidden;
}

.modal-title {
  font-size: 24px; font-weight: 800;
  color: var(--navy); padding: 34px 32px 0;
  letter-spacing: -0.4px;
}

.modal-body { padding: 4px 32px 34px; }

.modal-footer {
  padding: 20px 32px;
  border-top: 1.5px solid var(--border-lt);
  display: flex; justify-content: flex-end; gap: 12px;
  background: var(--white);
}

.section-title {
  font-size: 17px; font-weight: 700;
  color: var(--navy); margin: 30px 0 20px;
  letter-spacing: -0.2px;
}

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 20px; }
.form-row.full { grid-template-columns: 1fr; }
.form-group { display: flex; flex-direction: column; gap: 8px; }

.form-label {
  font-size: 13px; font-weight: 600; color: var(--navy);
  display: flex; align-items: center; gap: 6px;
}

.info-dot {
  width: 16px; height: 16px; border-radius: 50%;
  background: #b0b4c4; color: #fff;
  font-size: 9px; font-weight: 700;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: default; flex-shrink: 0; position: relative; font-style: normal;
}
.info-dot::after {
  content: attr(data-tip);
  position: absolute; bottom: calc(100% + 8px); left: 50%;
  transform: translateX(-50%);
  background: var(--navy); color: #e8eaf5;
  font-size: 12px; font-weight: 400; line-height: 1.55;
  padding: 8px 12px; border-radius: 8px;
  white-space: normal; width: 230px; text-align: left;
  pointer-events: none; opacity: 0; transition: opacity 0.15s;
  z-index: 9999; box-shadow: 0 4px 16px rgba(28,34,80,0.2);
}
.info-dot::before {
  content: ''; position: absolute;
  bottom: calc(100% + 3px); left: 50%; transform: translateX(-50%);
  border: 5px solid transparent; border-top-color: var(--navy);
  opacity: 0; transition: opacity 0.15s; pointer-events: none; z-index: 9999;
}
.info-dot:hover::after, .info-dot:hover::before { opacity: 1; }

.form-input, .form-select {
  width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
  padding: 11px 14px; font-size: 14px; font-family: 'Inter', sans-serif;
  color: var(--navy); outline: none; background: var(--white);
  appearance: none; -webkit-appearance: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.form-input:focus, .form-select:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(105,118,231,0.13);
}
.form-input::placeholder { color: var(--muted); font-weight: 300; }

.select-wrap { position: relative; }
.select-wrap::after {
  content: "▾"; position: absolute; right: 14px; top: 50%;
  transform: translateY(-50%); color: var(--muted); pointer-events: none; font-size: 12px;
}
.form-select { padding-right: 36px; cursor: pointer; }

.radio-group { display: flex; gap: 22px; align-items: center; padding-top: 4px; }
.radio-label {
  display: flex; align-items: center; gap: 8px;
  font-size: 14px; cursor: pointer; color: var(--text); font-weight: 400;
}
.radio-label input[type="radio"] { width: 17px; height: 17px; accent-color: var(--orange); cursor: pointer; }

.scan-seconds-wrap { position: relative; margin-top: 10px; }
.scan-seconds-wrap input {
  width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
  padding: 11px 72px 11px 14px; font-size: 14px; font-family: 'Inter', sans-serif;
  color: var(--navy); outline: none; transition: border-color 0.15s;
}
.scan-seconds-wrap input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(105,118,231,0.13); }
.scan-unit {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  color: var(--muted); font-size: 13px; pointer-events: none;
}

hr.divider { border: none; border-top: 1.5px solid var(--border-lt); margin: 28px 0; }

.color-wrap {
  display: flex; align-items: center; border: 1.5px solid var(--border);
  border-radius: 10px; overflow: hidden; transition: border-color 0.15s;
}
.color-wrap:focus-within { border-color: var(--blue); }
.color-wrap input[type="text"] {
  flex: 1; border: none; outline: none; padding: 11px 14px;
  font-size: 14px; font-family: 'Inter', sans-serif; color: var(--navy);
}
.color-swatch { width: 42px; height: 42px; background: #000; border-left: 1.5px solid var(--border); cursor: pointer; flex-shrink: 0; }
.color-swatch.grey { background: #aaa; }

.eye-label {
  font-size: 13px; font-weight: 500; color: var(--muted);
  display: flex; align-items: center; gap: 6px; margin-bottom: 7px;
}
.eye-label input[type="checkbox"] { accent-color: var(--blue); }
.color-wrap.disabled { opacity: 0.45; pointer-events: none; background: var(--section-bg); }

.upload-img-btn {
  display: inline-flex; align-items: center; gap: 8px;
  border: 1.5px solid var(--border); border-radius: 10px;
  padding: 10px 18px; font-size: 13px; font-family: 'Inter', sans-serif;
  background: var(--white); cursor: pointer; color: var(--text); font-weight: 500;
  transition: border-color 0.15s, background 0.15s;
}
.upload-img-btn:hover { background: var(--section-bg); border-color: var(--blue-alt); }

.editor-box {
  border: 1.5px solid var(--border); border-radius: 12px;
  padding: 22px; margin-top: 10px; background: var(--section-bg);
}
.editor-title { font-size: 13px; font-weight: 700; color: var(--navy); margin-bottom: 18px; }

.asset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 4px; }

.asset-card {
  border: 1.5px solid var(--border); border-radius: 12px;
  padding: 18px; background: var(--white);
}
.asset-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2px; }
.asset-card-title { font-size: 15px; font-weight: 800; color: var(--navy); padding-right: 8px; letter-spacing: -0.2px; }
.asset-card-edit {
  font-size: 12px; color: var(--blue); background: none; border: none;
  cursor: pointer; padding: 0; font-weight: 500; font-family: 'Inter', sans-serif;
  margin-bottom: 12px; display: inline-block;
}
.asset-card-edit:hover { text-decoration: underline; }
.asset-card-divider { border: none; border-top: 1.5px solid var(--border-lt); margin: 6px 0 14px; }
.asset-delete {
  background: none; border: none; cursor: pointer;
  color: var(--danger); line-height: 1; padding: 2px; flex-shrink: 0; opacity: 0.85;
}
.asset-delete:hover { opacity: 1; }

.asset-label {
  font-size: 12px; font-weight: 600; color: var(--navy);
  display: flex; align-items: center; gap: 4px; margin-bottom: 5px;
}
.optional-text { color: var(--muted); font-weight: 400; }
.asset-input {
  width: 100%; border: 1.5px solid var(--border); border-radius: 8px;
  padding: 9px 12px; font-size: 13px; font-family: 'Inter', sans-serif;
  color: var(--navy); outline: none; transition: border-color 0.15s, box-shadow 0.15s;
}
.asset-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(105,118,231,0.13); }
.asset-input::placeholder { color: var(--muted); font-weight: 300; }

.asset-field { margin-bottom: 14px; }
.asset-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }

.upload-asset-btn {
  width: 100%; padding: 12px; border: none; border-radius: 10px;
  background: var(--blue); color: #fff;
  font-size: 13px; font-weight: 700; font-family: 'Inter', sans-serif;
  cursor: pointer; text-align: center; margin-top: 2px;
  transition: background 0.15s; letter-spacing: 0.01em;
}
.upload-asset-btn:hover { background: var(--blue-dark); }
.upload-asset-btn .opt { font-weight: 400; opacity: 0.85; }

.photo-preview {
  width: 100%; height: 72px; background: var(--section-bg); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; margin-bottom: 8px; border: 1.5px solid var(--border-lt);
}
.photo-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }

.file-tag { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text); margin-bottom: 8px; }
.file-remove { color: var(--danger); background: none; border: none; cursor: pointer; font-size: 12px; text-decoration: underline; padding: 0; font-family: 'Inter', sans-serif; }

.add-asset-cell {
  border: 2px dashed var(--border); border-radius: 12px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 140px; cursor: pointer; position: relative;
  transition: border-color 0.15s, background 0.15s;
}
.add-asset-cell:hover { border-color: var(--blue); background: rgba(105,118,231,0.03); }
.add-icon {
  width: 44px; height: 44px; border-radius: 50%; background: var(--blue);
  color: #fff; font-size: 28px; display: flex; align-items: center; justify-content: center;
  margin-bottom: 8px; line-height: 1; user-select: none; transition: background 0.15s;
}
.add-asset-cell:hover .add-icon { background: var(--blue-dark); }
.add-label { font-size: 13px; color: var(--navy); font-weight: 600; }

.asset-dropdown {
  position: absolute; bottom: calc(100% + 8px); left: 0; right: 0;
  background: var(--white); border: 1.5px solid var(--border); border-radius: 12px;
  box-shadow: 0 8px 32px rgba(28,34,80,0.14); z-index: 300; overflow: hidden;
}
.asset-dropdown-inner { padding: 10px; }
.asset-dd-label { font-size: 10px; color: var(--muted); font-weight: 700; padding: 4px 10px 8px; text-transform: uppercase; letter-spacing: 0.07em; }
.asset-dd-item {
  display: flex; align-items: center; padding: 10px 12px; border-radius: 8px;
  cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text);
  user-select: none; transition: background 0.1s, color 0.1s;
}
.asset-dd-item:hover { background: var(--blue-bg); color: var(--navy); }
.asset-dd-divider { border: none; border-top: 1px solid var(--border-lt); margin: 6px 0; }
.asset-dd-custom-wrap { padding: 4px 2px 2px; }
.asset-dd-custom-input {
  width: 100%; border: 1.5px solid var(--border); border-radius: 8px;
  padding: 9px 12px; font-size: 13px; margin: 4px 0; outline: none;
  color: var(--navy); font-family: 'Inter', sans-serif; transition: border-color 0.15s;
}
.asset-dd-custom-input:focus { border-color: var(--blue); }
.asset-dd-custom-add {
  width: 100%; padding: 9px; border: none; border-radius: 8px;
  background: var(--blue); color: #fff; font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.15s;
}
.asset-dd-custom-add:hover { background: var(--blue-dark); }

.edit-type-overlay {
  position: fixed; inset: 0; background: rgba(28,34,80,0.45);
  display: flex; align-items: center; justify-content: center; z-index: 2000;
}
.edit-type-modal {
  background: var(--white); border-radius: 14px; padding: 26px; width: 360px;
  box-shadow: 0 12px 48px rgba(28,34,80,0.2);
}
.edit-type-title { font-size: 15px; font-weight: 800; color: var(--navy); margin-bottom: 16px; letter-spacing: -0.2px; }
.edit-type-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 16px; }
.edit-type-option {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px;
  cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text);
  border: 1.5px solid transparent; transition: background 0.1s;
}
.edit-type-option:hover { background: var(--blue-bg); }
.edit-type-option.selected { border-color: var(--blue); background: var(--blue-bg); color: var(--navy); font-weight: 600; }
.edit-type-option input[type="radio"] { accent-color: var(--blue); width: 15px; height: 15px; }
.edit-type-divider { border: none; border-top: 1px solid var(--border-lt); margin: 8px 0; }
.edit-type-custom-input {
  width: 100%; border: 1.5px solid var(--border); border-radius: 8px;
  padding: 9px 12px; font-size: 13px; outline: none; color: var(--navy); margin-top: 6px; font-family: 'Inter', sans-serif;
}
.edit-type-custom-input:focus { border-color: var(--blue); }
.edit-type-actions { display: flex; gap: 10px; justify-content: flex-end; }
.edit-type-cancel {
  padding: 9px 20px; border: 1.5px solid var(--border); border-radius: 8px;
  background: var(--white); color: var(--text); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.15s;
}
.edit-type-cancel:hover { background: var(--section-bg); }
.edit-type-save {
  padding: 9px 20px; border: none; border-radius: 8px;
  background: var(--blue); color: #fff; font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.15s;
}
.edit-type-save:hover { background: var(--blue-dark); }

.btn-close {
  padding: 11px 26px; border: 1.5px solid var(--danger); border-radius: 10px;
  background: var(--white); color: var(--danger); font-size: 14px; font-weight: 600;
  font-family: 'Inter', sans-serif; cursor: pointer; transition: background 0.15s;
}
.btn-close:hover { background: #fdf0f2; }
.btn-confirm {
  padding: 11px 26px; border: 1.5px solid var(--border-lt); border-radius: 10px;
  background: var(--border-lt); color: var(--muted); font-size: 14px; font-weight: 600;
  font-family: 'Inter', sans-serif; cursor: not-allowed;
}

.hidden { display: none !important; }
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title">New Campaign</div>
    <div class="modal-body">

      <div class="section-title">Campaign Details</div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Client Name <span class="info-dot" data-tip="Select the client associated with this campaign.">i</span></label>
          <div class="select-wrap">
            <select class="form-select"><option value="">Client Name</option><option>Acme Corp</option><option>Globex</option></select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Client Brand <span class="info-dot" data-tip="Select the brand under this client that the campaign belongs to.">i</span></label>
          <div class="select-wrap">
            <select class="form-select"><option value="">Client Brand</option><option>Brand Alpha</option><option>Brand Beta</option></select>
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Client Country <span class="info-dot" data-tip="The country where this campaign will primarily run.">i</span></label>
          <div class="select-wrap">
            <select class="form-select"><option value="">Client Country</option><option>Canada</option><option>United States</option><option>United Kingdom</option></select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Languages <span class="info-dot" data-tip="Choose the language(s) the campaign content will be delivered in.">i</span></label>
          <div class="select-wrap">
            <select class="form-select"><option value="">Languages</option><option>English</option><option>French</option><option>Spanish</option></select>
          </div>
        </div>
      </div>

      <div class="form-row full">
        <div class="form-group">
          <label class="form-label">Campaign Name <span class="info-dot" data-tip="Enter a unique name to identify this campaign internally.">i</span></label>
          <input class="form-input" type="text" placeholder="Campaign Name"/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Start Date <span class="info-dot" data-tip="The date on which the campaign will begin running.">i</span></label>
          <input class="form-input" type="date" value="2024-01-01"/>
        </div>
        <div class="form-group">
          <label class="form-label">End Date <span class="info-dot" data-tip="The date on which the campaign will stop running.">i</span></label>
          <input class="form-input" type="date" value="2024-12-31"/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Retail Location Tracking <span class="info-dot" data-tip="Enable to track which retail locations are associated with scans in this campaign.">i</span></label>
          <div class="radio-group">
            <label class="radio-label"><input type="radio" name="rlt" value="yes" checked/> Yes</label>
            <label class="radio-label"><input type="radio" name="rlt" value="no"/> No</label>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Scan Timer <span class="info-dot" data-tip="If enabled, the TapScan code will only be scannable for the specified number of seconds.">i</span></label>
          <div class="radio-group">
            <label class="radio-label"><input type="radio" name="scan" value="yes" id="scanYes"/> Yes</label>
            <label class="radio-label"><input type="radio" name="scan" value="no" id="scanNo" checked/> No</label>
          </div>
          <div id="scanSeconds" class="hidden">
            <div class="scan-seconds-wrap">
              <input type="number" value="30" min="1"/>
              <span class="scan-unit">Seconds</span>
            </div>
          </div>
        </div>
      </div>

      <hr class="divider"/>
      <div class="section-title">Code Details</div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Standard or Custom TapScan Code <span class="info-dot" data-tip="Choose Standard for a default TapScan code, or select a saved brand or create a custom one.">i</span></label>
          <div class="select-wrap">
            <select class="form-select" id="tapScanSelect">
              <option value="standard">Standard</option>
              <option value="brand1">Brand #1</option>
              <option value="brand2">Brand #2</option>
              <option value="addnew">Add New</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Quantity of TapScan Codes <span class="info-dot" data-tip="Enter the total number of TapScan codes to generate for this campaign.">i</span></label>
          <input class="form-input" type="number" placeholder="Quantity" min="1"/>
        </div>
      </div>

      <div id="codeEditorSection" class="hidden">
        <div class="editor-box">
          <div class="editor-title">Custom TapScan Code Editor</div>
          <div class="form-group" style="margin-bottom:16px">
            <label class="form-label">TapScan Code Name <span class="info-dot" data-tip="Give this custom TapScan code a name for easy identification later.">i</span></label>
            <input class="form-input" type="text" placeholder="Code Name"/>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">TapScan Code Colour <span class="info-dot" data-tip="Set the primary colour of the TapScan code graphic.">i</span></label>
              <div class="color-wrap">
                <input type="text" value="#000000"/>
                <div class="color-swatch"></div>
              </div>
            </div>
            <div class="form-group">
              <div class="eye-label">
                <input type="checkbox" id="eyeCheck"/> Custom Eye Colour
                <span class="info-dot" style="background:var(--muted)" data-tip="Optionally set a separate colour for the eye elements of the TapScan code.">i</span>
              </div>
              <div class="color-wrap disabled" id="eyeColorWrap">
                <input type="text" value="#000000" disabled/>
                <div class="color-swatch grey"></div>
              </div>
            </div>
          </div>
          <div class="form-group" style="margin-top:16px">
            <label class="form-label">Add Logo (PNG, JPG) <span class="info-dot" data-tip="Upload a brand logo to be embedded in the centre of the TapScan code.">i</span></label>
            <button class="upload-img-btn">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
              Upload Image
            </button>
          </div>
        </div>
      </div>

      <hr class="divider"/>
      <div class="section-title">Asset Details</div>
      <div class="asset-grid" id="assetGrid"></div>

    </div>

    <div class="modal-footer">
      <button class="btn-close" onclick="document.getElementById('overlay').style.display='none'">Close</button>
      <button class="btn-confirm">Confirm</button>
    </div>
  </div>
</div>

<script>
const ASSET_TYPES = [
  { id:'endcap',   label:'Endcap Display' },
  { id:'arch',     label:'Arch Display' },
  { id:'fsu',      label:'FSU Display' },
  { id:'sidewing', label:'Side Wing Display' },
  { id:'pallet',   label:'Pallet Display' },
  { id:'header',   label:'Header Display' },
  { id:'custom',   label:'Custom / Other', isCustom:true }
];

let addedAssets=[], ddOpen=false, assetPhotos={}, showCustomInput=false, customInputVal='';
let editingIdx=null, editSelected=null, editCustomVal='';

function getDisplayLabel(asset, allAssets) {
  // Count how many assets share the same base type id
  const sameType = allAssets.filter(a => a.typeId === asset.typeId);
  if (sameType.length <= 1) return asset.baseLabel;
  const num = sameType.findIndex(a => a.uid === asset.uid) + 1;
  return `${asset.baseLabel} (${num})`;
}

function renderGrid() {
  const grid = document.getElementById('assetGrid');
  grid.innerHTML = '';

  addedAssets.forEach((asset, idx) => {
    const card = document.createElement('div');
    card.className = 'asset-card';
    const hasPhoto = assetPhotos[idx];
    const displayLabel = getDisplayLabel(asset, addedAssets);
    card.innerHTML = `
      <div class="asset-card-header">
        <div class="asset-card-title">${displayLabel}</div>
        <button class="asset-delete" onclick="removeAsset(${idx})" title="Remove">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14H6L5,6"/>
            <path d="M10,11v6"/><path d="M14,11v6"/><path d="M9,6V4h6v2"/>
          </svg>
        </button>
      </div>
      <button class="asset-card-edit" onclick="openEditType(${idx})">Edit Display Type</button>
      <hr class="asset-card-divider"/>
      <div class="asset-field">
        <label class="asset-label">Asset Name <span class="optional-text">(Optional)</span> <span class="info-dot" data-tip="A descriptive name for this specific display asset.">i</span></label>
        <input class="asset-input" type="text" placeholder="Asset Name"/>
      </div>
      <div class="asset-field-row">
        <div>
          <label class="asset-label">Element # <span class="optional-text">(Optional)</span> <span class="info-dot" data-tip="The element or SKU number tied to this display asset.">i</span></label>
          <input class="asset-input" type="text" placeholder="Element #"/>
        </div>
        <div>
          <label class="asset-label">Production Volume <span class="info-dot" data-tip="The number of units to be produced for this display asset.">i</span></label>
          <input class="asset-input" type="number" placeholder="Production Volume"/>
        </div>
      </div>
      ${hasPhoto ? `
        <div class="photo-preview"><img src="${hasPhoto}" alt="preview"/></div>
        <div class="file-tag">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#6976e7" stroke-width="2"><path d="M14,2H6A2,2,0,0,0,4,4V20A2,2,0,0,0,6,22H18A2,2,0,0,0,20,20V8Z"/><polyline points="14,2 14,8 20,8"/></svg>
          <span>photonumberone.png</span>
          <button class="file-remove" onclick="removePhoto(${idx})">Remove</button>
        </div>` : ''}
      <button class="upload-asset-btn" onclick="triggerUpload(${idx})">Upload Asset Visual <span class="opt">(Optional)</span></button>
      <input type="file" id="fileInput${idx}" accept="image/*" style="display:none" onchange="handleFile(${idx},this)"/>
    `;
    grid.appendChild(card);
  });

  const addCell = document.createElement('div');
  addCell.className = 'add-asset-cell';
  addCell.id = 'addAssetCell';
  addCell.onclick = toggleDD;
  addCell.innerHTML = `
    <div class="add-icon">+</div>
    <div class="add-label">Add an Asset</div>
    ${ddOpen ? `
    <div class="asset-dropdown" id="assetDropdown" onclick="event.stopPropagation()">
      <div class="asset-dropdown-inner">
        <div class="asset-dd-label">Select a display type</div>
        ${ASSET_TYPES.filter(t=>!t.isCustom).map(t=>`
          <div class="asset-dd-item" onclick="event.stopPropagation();selectAndAdd('${t.id}','${t.label}')">${t.label}</div>`).join('')}
        <hr class="asset-dd-divider"/>
        <div class="asset-dd-item" onclick="event.stopPropagation();toggleCustomInput()">Custom / Other</div>
        ${showCustomInput ? `
        <div class="asset-dd-custom-wrap" onclick="event.stopPropagation()">
          <input class="asset-dd-custom-input" id="customInput" type="text" placeholder="Enter display type name..." value="${customInputVal}" oninput="customInputVal=this.value"/>
          <button class="asset-dd-custom-add" onclick="event.stopPropagation();addCustom()">Add</button>
        </div>` : ''}
      </div>
    </div>` : ''}
  `;
  grid.appendChild(addCell);
  if (ddOpen && showCustomInput) setTimeout(()=>{ const ci=document.getElementById('customInput'); if(ci) ci.focus(); },10);
}

function toggleDD(e) {
  if (e.target.closest('.asset-dropdown')) return;
  ddOpen=!ddOpen;
  if(!ddOpen){showCustomInput=false;customInputVal='';}
  renderGrid();
}
function selectAndAdd(typeId, baseLabel) {
  addedAssets.push({ uid: Date.now() + Math.random(), typeId, baseLabel });
  ddOpen=false; showCustomInput=false; customInputVal=''; renderGrid();
}
function toggleCustomInput(){showCustomInput=!showCustomInput;renderGrid();}
function addCustom(){
  const name=customInputVal.trim(); if(!name)return;
  addedAssets.push({ uid: Date.now() + Math.random(), typeId: 'custom_' + Date.now(), baseLabel: name, isCustom: true });
  ddOpen=false; showCustomInput=false; customInputVal=''; renderGrid();
}
function removeAsset(idx){
  addedAssets.splice(idx,1);
  const np={};
  Object.keys(assetPhotos).forEach(k=>{const ki=parseInt(k);if(ki<idx)np[ki]=assetPhotos[ki];else if(ki>idx)np[ki-1]=assetPhotos[ki];});
  assetPhotos=np;renderGrid();
}
function triggerUpload(idx){const fi=document.getElementById('fileInput'+idx);if(fi)fi.click();}
function handleFile(idx,input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();r.onload=e=>{assetPhotos[idx]=e.target.result;renderGrid();};r.readAsDataURL(file);
}
function removePhoto(idx){delete assetPhotos[idx];renderGrid();}

function openEditType(idx){
  editingIdx=idx;
  const current=addedAssets[idx];
  const match=ASSET_TYPES.find(t=>t.id===current.typeId);
  editSelected=match?match.id:'custom';
  editCustomVal=current.isCustom?current.baseLabel:'';
  const overlay=document.createElement('div');
  overlay.className='edit-type-overlay';overlay.id='editTypeOverlay';
  overlay.onclick=function(e){if(e.target===this)closeEditType();};
  overlay.innerHTML=`
    <div class="edit-type-modal" onclick="event.stopPropagation()">
      <div class="edit-type-title">Edit Display Type</div>
      <div class="edit-type-list" id="editTypeList">
        ${ASSET_TYPES.filter(t=>!t.isCustom).map(t=>`
          <div class="edit-type-option${editSelected===t.id?' selected':''}" onclick="selectEditType('${t.id}')">
            <input type="radio" name="editType" value="${t.id}" ${editSelected===t.id?'checked':''}/>${t.label}
          </div>`).join('')}
        <hr class="edit-type-divider"/>
        <div class="edit-type-option${editSelected==='custom'?' selected':''}" onclick="selectEditType('custom')">
          <input type="radio" name="editType" value="custom" ${editSelected==='custom'?'checked':''}/>Custom / Other
        </div>
        <div id="editCustomField" style="${editSelected==='custom'?'':'display:none'}">
          <input class="edit-type-custom-input" id="editCustomInput" type="text" placeholder="Enter display type name..." value="${editCustomVal}" oninput="editCustomVal=this.value"/>
        </div>
      </div>
      <div class="edit-type-actions">
        <button class="edit-type-cancel" onclick="closeEditType()">Cancel</button>
        <button class="edit-type-save" onclick="saveEditType()">Save</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}
function selectEditType(id){
  editSelected=id;
  document.querySelectorAll('.edit-type-option').forEach(el=>{
    const v=el.querySelector('input').value;
    el.classList.toggle('selected',v===id);el.querySelector('input').checked=v===id;
  });
  const cf=document.getElementById('editCustomField');if(cf)cf.style.display=id==='custom'?'':'none';
  if(id==='custom')setTimeout(()=>{const ci=document.getElementById('editCustomInput');if(ci)ci.focus();},10);
}
function saveEditType(){
  if(editingIdx===null)return;
  const uid=addedAssets[editingIdx].uid;
  if(editSelected==='custom'){
    const name=editCustomVal.trim();if(!name)return;
    addedAssets[editingIdx]={uid, typeId:'custom_'+Date.now(), baseLabel:name, isCustom:true};
  } else {
    const type=ASSET_TYPES.find(t=>t.id===editSelected);
    if(type) addedAssets[editingIdx]={uid, typeId:type.id, baseLabel:type.label};
  }
  closeEditType();renderGrid();
}
function closeEditType(){editingIdx=null;const el=document.getElementById('editTypeOverlay');if(el)el.remove();}

document.addEventListener('click',function(e){
  if(ddOpen&&!e.target.closest('#addAssetCell')){ddOpen=false;showCustomInput=false;customInputVal='';renderGrid();}
});
document.getElementById('scanYes').addEventListener('change',function(){document.getElementById('scanSeconds').classList.toggle('hidden',!this.checked);});
document.getElementById('scanNo').addEventListener('change',function(){document.getElementById('scanSeconds').classList.add('hidden');});
document.getElementById('tapScanSelect').addEventListener('change',function(){document.getElementById('codeEditorSection').classList.toggle('hidden',this.value!=='addnew');});
document.getElementById('eyeCheck').addEventListener('change',function(){
  const wrap=document.getElementById('eyeColorWrap');
  wrap.classList.toggle('disabled',!this.checked);wrap.querySelector('input').disabled=!this.checked;
});
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)this.style.display='none';});

renderGrid();
</script>
</body>
</html>
